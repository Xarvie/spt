name: clang-tidy
on: [push, pull_request]

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang + clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy llvm ninja-build
      - name: Configure (compile_commands.json)
        run: cmake -B build-tidy -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: |
          find src -name "*.c" -not -path "src/vm/*" | while read f; do
            echo "Checking $f..."
            clang-tidy -p build-tidy "$f"
          done
