name: Coverage
on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang + llvm-cov
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm ninja-build
      - name: Configure (Coverage)
        run: cmake --preset clang-coverage
      - name: Build
        run: cmake --build --preset clang-coverage
      - name: Test
        run: ctest --preset clang-coverage
      - name: Generate Coverage Report
        run: |
          # 收集所有 .profraw 文件并合并
          find build-cov -name "*.profraw" -exec llvm-profdata merge -spatial -o coverage.profdata {} +
          llvm-cov show -format=html -output-dir=coverage-report \
            -instr-profile=coverage.profdata \
            build-cov/bin/sptscript \
            src/vm/ src/codegen/ src/frontend/
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
